<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>فشل التفعيل</title>
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f8d7da;
            color: #721c24;
            text-align: center;
            padding-top: 100px;
        }

        .card {
            display: inline-block;
            background: white;
            padding: 30px 50px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        a {
            text-decoration: none;
            background-color: #721c24;
            color: white;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: bold;
        }

        a:hover {
            background-color: #501217;
        }
    </style>
</head>
<body dir="rtl">
    <div class="card">
        <h1>⚠️ فشل في تفعيل الحساب</h1>
        <p>عذرًا، رابط التفعيل غير صالح أو انتهت صلاحيته.</p>
        <a href="{% url 'settings:home' %}">العودة إلى الصفحة الرئيسية</a>
    </div>
</body>
</html>
