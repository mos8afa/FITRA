{% extends "admin/base_site.html" %}
{% load i18n %}

{% block userlinks %}
    {{ block.super }}
    <form action="{% url 'set_language' %}" method="post" style="display:inline; margin-left:10px;">
        {% csrf_token %}
        <input name="next" type="hidden" value="{{ request.get_full_path }}">
        {% if LANGUAGE_CODE == 'ar' %}
            <input type="hidden" name="language" value="en">
            <button type="submit" class="button" style="background:#1e90ff; color:white; border:none; padding:5px 10px; border-radius:5px;">
                English
            </button>
        {% else %}
            <input type="hidden" name="language" value="ar">
            <button type="submit" class="button" style="background:#32cd32; color:white; border:none; padding:5px 10px; border-radius:5px;">
                العربية
            </button>
        {% endif %}
    </form>
{% endblock %}
